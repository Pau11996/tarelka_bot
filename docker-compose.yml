services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wellhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wellhealth}
      POSTGRES_DB: ${POSTGRES_DB:-wellhealth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wellhealth}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai_analyzer:
    build:
      context: .
      dockerfile: Dockerfile.ai
    env_file:
      - .env
    environment:
      CURSOR_API_KEY: ${CURSOR_API_KEY}
      CURSOR_MODEL: ${CURSOR_MODEL:-composer-2.5}
      CURSOR_TIMEOUT: ${CURSOR_TIMEOUT:-180}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,ai_analyzer,bot}
      NODE_USE_ENV_PROXY: ${NODE_USE_ENV_PROXY:-1}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
    volumes:
      - cursor_data:/root/.config/cursor
      - ai_uploads:/tmp/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      postgres:
        condition: service_healthy
      ai_analyzer:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_FEEDBACK_CHAT: ${TELEGRAM_FEEDBACK_CHAT:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wellhealth:wellhealth@postgres:5432/wellhealth}
      AI_ANALYZER_URL: ${AI_ANALYZER_URL:-http://ai_analyzer:8000}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      MESSAGE_CLEANUP_TTL_SECONDS: ${MESSAGE_CLEANUP_TTL_SECONDS:-7200}
      DAILY_REQUEST_LIMIT: ${DAILY_REQUEST_LIMIT:-6}
    restart: unless-stopped

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "${LANDING_PORT:-8080}:80"
    environment:
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-taarelka_bot}
      TELEGRAM_FEEDBACK_CHAT: ${TELEGRAM_FEEDBACK_CHAT:-}
      LANDING_TITLE: ${LANDING_TITLE:-ТАРЕЛКА}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  cursor_data:
  ai_uploads:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.77.0/24
